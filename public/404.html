<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ZakCalendario</title>
    <script>
      // Redireciona rotas SPA preservando compatibilidade em raiz e subdiretório
      var l = window.location;
      var repoBase = 'meu-calend-rio-brasil';
      var pathSegmentsToKeep = l.pathname.startsWith('/' + repoBase + '/') ? 1 : 0;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
